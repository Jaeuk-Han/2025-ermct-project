services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    expose:
      - "8000"
    restart: unless-stopped

  hospital-status-sync:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env.production
    command:
      - "poetry"
      - "run"
      - "python"
      - "scripts/sync_hospital_status.py"
      - "--interval-seconds"
      - "${HOSPITAL_STATUS_SYNC_INTERVAL_SECONDS:-300}"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: front/Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_DEMO_AUTH: ${VITE_DEMO_AUTH:-false}
        VITE_TMAP_API_KEY: ${VITE_TMAP_API_KEY:-}
        VITE_KAKAO_MAP_KEY: ${VITE_KAKAO_MAP_KEY:-}
        VITE_KAKAO_MAP_APP_KEY: ${VITE_KAKAO_MAP_APP_KEY:-}
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    depends_on:
      - backend
    ports:
      - "80:80"
      # - "443:443"
    restart: unless-stopped
